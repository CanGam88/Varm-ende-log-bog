<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"/>
    <title>ROCKWOOL - Logbog</title>
    <style>
        :root {
            --rock-red: #E60028;
            --bg-page: #f2f4f6;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: #d1d5db;
            --input-bg: #f9fafb;
            --radius: 12px;
            --btn-radius: 50px;
        }

        body.dark-mode {
            --bg-page: #0f111a;
            --bg-card: #1a1c26;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #1a1c26;
        }

        body { 
            margin: 0; padding: 0; font-family: "Segoe UI", sans-serif; 
            background-color: var(--bg-page); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header { 
            background: var(--rock-red); padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center;
            height: 60px; color: white; flex-shrink: 0;
        }

        .header-logo { font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        
        .btn-menu { 
            background: rgba(255,255,255,0.2); border: 1px solid white; 
            color: white; padding: 6px 16px; border-radius: var(--btn-radius);
            cursor: pointer; font-weight: 700;
        }

        .app-container { max-width: 650px; margin: 20px auto; width: 95%; flex: 1; }

        .card {
            background: var(--bg-card); padding: 20px;
            border-radius: var(--radius); margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Tabs / Knapper */
        .tab-container { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn {
            background: none; border: 2px solid var(--rock-red); color: var(--rock-red);
            padding: 8px 16px; font-size: 12px; font-weight: 800;
            border-radius: var(--btn-radius); cursor: pointer; flex: 1;
        }
        .tab-btn.active { background: var(--rock-red); color: white; }

        /* Input felter */
        label { display: block; font-weight: 700; font-size: 14px; margin-bottom: 5px; color: var(--text-main); }
        input, select, textarea { 
            width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 8px; 
            border: 1px solid var(--border); background: var(--input-bg); 
            color: var(--text-main); font-size: 16px; box-sizing: border-box; 
        }
        
        /* Specifik stil til låst dato */
        input[readonly] { background: var(--bg-page); border-style: dashed; cursor: not-allowed; opacity: 0.7; }
        input::-webkit-calendar-picker-indicator { display: none; }

        .btn-red { background: var(--rock-red); color: white; border: none; padding: 16px; width: 100%; border-radius: var(--btn-radius); font-weight: 800; cursor: pointer; font-size: 16px; }
        .btn-secondary { width:100%; background:none; border:none; margin-top:10px; color:var(--text-muted); font-weight:800; cursor:pointer; text-transform: uppercase; }

        /* Modal */
        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { 
            background: var(--bg-card); color: var(--text-main);
            margin: 15% auto; padding: 30px; width: 85%; max-width: 400px; 
            border-radius: var(--radius); border-top: 6px solid var(--rock-red); text-align: center;
        }

        #menuContent { display:none; position:absolute; top:65px; left:20px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; z-index:2000; min-width: 220px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .menu-item { width:100%; padding:15px 20px; border:none; background:none; text-align:left; color:var(--text-main); font-weight:700; cursor:pointer; border-bottom:1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        
        .list-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; border-left: 5px solid var(--rock-red); margin-bottom: 10px; background: var(--input-bg); border-radius: 4px; }
        
        footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; font-weight: 600; }
    </style>
</head>
<body class="dark-mode">

<header>
    <button onclick="toggleMenu()" class="btn-menu">MENU ▾</button>
    <div class="header-logo">ROCKWOOL</div>
</header>

<div id="menuContent">
    <button onclick="location.reload()" class="menu-item">🏠 Ny Log</button>
    <button onclick="document.body.classList.toggle('dark-mode'); toggleMenu();" class="menu-item">🌓 Skift Tema</button>
    <button id="btnOpenSettings" class="menu-item">⚙️ Indstillinger 🔒</button>
</div>

<main class="app-container">
    <div class="tab-container">
        <button id="tabNew" class="tab-btn active">NY LOG</button>
        <button id="tabDrafts" class="tab-btn">KLADDER</button>
        <button id="tabHistory" class="tab-btn">HISTORIK</button>
    </div>

    <section id="pageNew" class="card">
        <label>DATO (LÅST)</label>
        <input id="logDate" type="date" readonly tabindex="-1" />
        
        <label>ARBEJDSNUMMER (5 CIFRE)</label>
        <input id="workNr" type="text" maxlength="5" placeholder="fx 01234"/>
        
        <label>OVERSKRIFT</label>
        <input id="headline" type="text" placeholder="Kort beskrivelse af hændelse..."/>
        
        <label>BESKRIVELSE</label>
        <textarea id="bodyText" rows="5" placeholder="Uddyb her..."></textarea>
        
        <button id="btnSave" class="btn-red">GEM I KLADDER</button>
    </section>

    <section id="pageDrafts" class="card" style="display:none">
        <h2 style="margin-top:0; color:var(--rock-red);">KLADDER</h2>
        <div id="draftList"></div>
        <button id="btnSendAll" class="btn-red" style="margin-top:20px;">SEND ALLE RAPPORTER</button>
    </section>

    <section id="pageHistory" class="card" style="display:none">
        <h2 style="margin-top:0; color:var(--rock-red);">HISTORIK</h2>
        <input id="historyDatePicker" type="date" />
        <div id="historyList"></div>
    </section>
</main>

<footer>App lavet af Lasse Gamborg</footer>

<div id="customModal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDBwdvNeqXGTBKSnrejyxv1rWwPLtcgXuw",
      authDomain: "logbog---lasse-gamborg.firebaseapp.com",
      projectId: "logbog---lasse-gamborg",
      storageBucket: "logbog---lasse-gamborg.firebasestorage.app",
      messagingSenderId: "501888216233",
      appId: "1:501888216233:web:980b74fb985a96e6370db8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Hjælpefunktioner
    const el = (id) => document.getElementById(id);
    const vib = (ms = 40) => { if("vibrate" in navigator) navigator.vibrate(ms); };
    const getToday = () => new Date().toISOString().split('T')[0];

    // Menu styring
    window.toggleMenu = () => { vib(); const m = el('menuContent'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; };
    window.onclick = (e) => { if(!e.target.matches('.btn-menu')) el('menuContent').style.display = 'none'; };

    // Navigation
    function showPage(pageId, tabId) {
        vib(20);
        ['pageNew', 'pageDrafts', 'pageHistory'].forEach(p => el(p).style.display = 'none');
        ['tabNew', 'tabDrafts', 'tabHistory'].forEach(t => el(t).classList.remove('active'));
        el(pageId).style.display = 'block';
        el(tabId).classList.add('active');
        if(pageId === 'pageNew') el('logDate').value = getToday();
    }

    el('tabNew').onclick = () => showPage('pageNew', 'tabNew');
    el('tabDrafts').onclick = () => { showPage('pageDrafts', 'tabDrafts'); renderDrafts(); };
    el('tabHistory').onclick = () => showPage('pageHistory', 'tabHistory');

    // Start-up
    el('logDate').value = getToday();

    // Modal system
    function showModal(contentHTML) {
        el('modal-body').innerHTML = contentHTML;
        el('customModal').style.display = 'block';
    }
    window.closeModal = () => el('customModal').style.display = 'none';

    // Indstillinger (Admin)
    el('btnOpenSettings').onclick = () => {
        toggleMenu();
        showModal(`
            <h2 style="color:var(--rock-red);">ADMIN LOGIND</h2>
            <p>Indtast kode:</p>
            <input type="password" id="adminPwd">
            <button class="btn-red" id="btnCheckAdmin">Log ind</button>
            <button class="btn-secondary" onclick="closeModal()">Annuller</button>
        `);
        el('btnCheckAdmin').onclick = () => {
            if(el('adminPwd').value === "1234") {
                const mails = localStorage.getItem('rw_mails') || '';
                showModal(`
                    <h2 style="color:var(--rock-red);">INDSTILLINGER</h2>
                    <label>Modtager e-mails (komma-separeret)</label>
                    <input type="text" id="mailInput" value="${mails}" placeholder="navn@rockwool.com">
                    <button class="btn-red" id="btnSaveMails">GEM</button>
                    <button class="btn-secondary" onclick="closeModal()">LUK</button>
                `);
                el('btnSaveMails').onclick = () => {
                    localStorage.setItem('rw_mails', el('mailInput').value);
                    vib();
                    closeModal();
                };
            } else { alert("Forkert kode"); }
        };
    };

    // Gem Kladde
    el('btnSave').onclick = () => {
        const draft = {
            date: el('logDate').value,
            workNr: el('workNr').value,
            headline: el('headline').value,
            body: el('bodyText').value,
            timestamp: Date.now()
        };
        if(draft.workNr.length !== 5 || !draft.headline) {
            vib(100);
            return alert("Udfyld venligst arbejdsnummer (5 cifre) og overskrift");
        }
        
        let drafts = JSON.parse(localStorage.getItem('rw_drafts') || '[]');
        drafts.push(draft);
        localStorage.setItem('rw_drafts', JSON.stringify(drafts));
        
        vib(60);
        showModal(`<h2 style="color:var(--rock-red);">GEMT</h2><p>Loggen er gemt i kladder.</p><button class="btn-red" onclick="closeModal()">OK</button>`);
        el('workNr').value = ''; el('headline').value = ''; el('bodyText').value = '';
    };

    function renderDrafts() {
        const drafts = JSON.parse(localStorage.getItem('rw_drafts') || '[]');
        if(drafts.length === 0) {
            el('draftList').innerHTML = "<p style='text-align:center; color:var(--text-muted);'>Ingen kladder fundet.</p>";
            el('btnSendAll').style.display = "none";
            return;
        }
        el('btnSendAll').style.display = "block";
        el('draftList').innerHTML = drafts.map((d, i) => `
            <div class="list-item">
                <strong>${d.headline}</strong><br>
                <small>${d.date} | Nr: ${d.workNr}</small>
            </div>
        `).join('');
    }

    // Send kladder
    el('btnSendAll').onclick = async () => {
        vib(100);
        const drafts = JSON.parse(localStorage.getItem('rw_drafts') || '[]');
        if(!confirm(`Vil du sende ${drafts.length} rapporter?`)) return;

        try {
            for (const d of drafts) {
                await addDoc(collection(db, "logs"), { ...d, sentAt: serverTimestamp() });
            }
            
            const mailTo = localStorage.getItem('rw_mails') || "";
            const mailBody = drafts.map(d => `DATO: ${d.date}%0ANR: ${d.workNr}%0AEMNE: ${d.headline}%0A---%0A${d.body}%0A%0A`).join('%0A');
            
            window.location.href = `mailto:${mailTo}?subject=Rockwool Log Rapport&body=${mailBody}`;
            
            localStorage.setItem('rw_drafts', '[]');
            showPage('pageNew', 'tabNew');
            alert("Rapporter sendt!");
        } catch (e) {
            alert("Fejl: " + e.message);
        }
    };
</script>

</body>
</html>
