<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"/>
    <title>ROCKWOOL - Logbog</title>
    <style>
        :root {
            --rock-red: #E60028;
            --bg-page: #f2f4f6;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border: #d1d5db;
            --input-bg: #f9fafb;
            --radius: 12px;
            --btn-radius: 50px;
        }

        body.dark-mode {
            --bg-page: #0f111a;
            --bg-card: #1a1c26;
            --text-main: #f8fafc !important;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #1a1c26;
        }

        /* --- KALENDER FIX --- */
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            min-height: 50px;
            color: var(--text-main) !important;
        }

        body.dark-mode input[type="date"]::-webkit-calendar-picker-indicator {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        body { 
            margin: 0; padding: 0; font-family: "Segoe UI", sans-serif; 
            background-color: var(--bg-page); color: var(--text-main);
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header { 
            background: var(--rock-red); padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center;
            height: 60px; color: white; position: sticky; top:0; z-index: 1000;
        }

        .header-logo { font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        .btn-menu { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 16px; border-radius: var(--btn-radius); cursor: pointer; font-weight: 700; }

        #menuContent { 
            display:none; position:fixed; top:65px; left:20px; 
            background:var(--bg-card); border:1px solid var(--border); 
            border-radius:12px; z-index:2000; min-width: 220px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
        .menu-item { width:100%; padding:15px 20px; border:none; background:none; text-align:left; color:var(--text-main); font-weight:700; cursor:pointer; border-bottom:1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 16px; }

        .app-container { max-width: 650px; margin: 20px auto; width: 95%; flex: 1; }
        .card { background: var(--bg-card); padding: 20px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .tab-container { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { background: none; border: 2px solid var(--rock-red); color: var(--rock-red); padding: 10px; font-size: 12px; font-weight: 800; border-radius: var(--btn-radius); cursor: pointer; flex: 1; text-transform: uppercase; }
        .tab-btn.active { background: var(--rock-red); color: white; }

        label { display: block; font-weight: 800; font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; margin-top: 15px; }
        input, textarea { width: 100%; padding: 14px; border-radius: 8px; border: 2px solid var(--border); background: var(--input-bg); color: var(--text-main) !important; font-size: 16px; box-sizing: border-box; }

        .btn-red { background: var(--rock-red); color: white; border: none; padding: 16px; width: 100%; border-radius: var(--btn-radius); font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 20px; }
        
        /* --- LISTE VISNING --- */
        .list-item { padding: 18px; border-bottom: 1px solid var(--border); border-left: 6px solid var(--rock-red); margin-bottom: 15px; background: rgba(128,128,128,0.05); border-radius: 8px; text-align: left; position: relative; }
        .list-item strong { font-size: 18px; color: var(--rock-red); display: block; margin-bottom: 5px; }
        .list-item .info-line { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 10px; }
        .list-item .body-content { color: var(--text-main) !important; font-size: 15px; white-space: pre-wrap; display: block; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 4px; }

        .modal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-card); color: var(--text-main); margin: 15% auto; padding: 30px; width: 85%; max-width: 400px; border-radius: var(--radius); border-top: 6px solid var(--rock-red); text-align: center; }

        footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body class="dark-mode">

<header>
    <button onclick="toggleMenu()" class="btn-menu">MENU ▾</button>
    <div class="header-logo">ROCKWOOL</div>
</header>

<div id="menuContent">
    <button onclick="location.reload()" class="menu-item">🏠 Forside</button>
    <button onclick="handleDarkMode()" class="menu-item">🌓 Skift Tema</button>
    <button onclick="handleAdminOpen()" class="menu-item">⚙️ Indstillinger</button>
</div>

<main class="app-container">
    <div class="tab-container">
        <button id="tabNew" class="tab-btn active" onclick="showPage('pageNew', 'tabNew')">Ny Log</button>
        <button id="tabDrafts" class="tab-btn" onclick="showPage('pageDrafts', 'tabDrafts')">Kladder</button>
        <button id="tabHistory" class="tab-btn" onclick="showPage('pageHistory', 'tabHistory')">Historik</button>
    </div>

    <section id="pageNew">
        <div class="card">
            <label>Dato (Låst)</label>
            <input id="logDate" type="date" readonly />
            <label>Arbejdsnummer</label>
            <input id="workNr" type="text" maxlength="5" placeholder="fx 41045"/>
            <label>Overskrift</label>
            <input id="headline" type="text" placeholder="Titel..."/>
            <label>Beskrivelse</label>
            <textarea id="bodyText" rows="6" placeholder="Skriv detaljer her..."></textarea>
            <button id="btnSave" class="btn-red">GEM SOM KLADDE</button>
        </div>
    </section>

    <section id="pageDrafts" style="display:none">
        <div class="card">
            <h2 style="color:var(--rock-red)">KLADDER</h2>
            <div id="draftList"></div>
            <button id="btnSendAll" class="btn-red" style="display:none;">SEND & ARKIVÉR</button>
        </div>
    </section>

    <section id="pageHistory" style="display:none">
        <div class="card">
            <h2 style="color:var(--rock-red)">HISTORIK</h2>
            <label>Søg efter dato</label>
            <input id="historyDate" type="date" onchange="fetchHistory()" />
            <div id="historyList" style="margin-top:20px;"></div>
        </div>
    </section>
</main>

<footer>App lavet af Lasse Gamborg</footer>

<div id="customModal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDBwdvNeqXGTBKSnrejyxv1rWwPLtcgXuw",
      authDomain: "logbog---lasse-gamborg.firebaseapp.com",
      projectId: "logbog---lasse-gamborg",
      storageBucket: "logbog---lasse-gamborg.firebasestorage.app",
      messagingSenderId: "501888216233",
      appId: "1:501888216233:web:980b74fb985a96e6370db8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const el = (id) => document.getElementById(id);
    const getToday = () => new Date().toISOString().split('T')[0];

    window.toggleMenu = () => { const m = el('menuContent'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; };
    window.handleDarkMode = () => { document.body.classList.toggle('dark-mode'); el('menuContent').style.display = 'none'; };
    window.showModal = (html) => { el('modal-body').innerHTML = html; el('customModal').style.display = 'block'; };
    window.closeModal = () => { el('customModal').style.display = 'none'; };

    window.showPage = (pageId, tabId) => {
        ['pageNew', 'pageDrafts', 'pageHistory'].forEach(p => el(p).style.display = 'none');
        ['tabNew', 'tabDrafts', 'tabHistory'].forEach(t => el(t).classList.remove('active'));
        el(pageId).style.display = 'block';
        el(tabId).classList.add('active');
        if(pageId === 'pageDrafts') renderDrafts();
        if(pageId === 'pageHistory') el('historyDate').value = getToday();
    };

    el('logDate').value = getToday();

    el('btnSave').onclick = () => {
        const d = { date: el('logDate').value, workNr: el('workNr').value, headline: el('headline').value, body: el('bodyText').value };
        if(!d.workNr || !d.headline) return alert("Udfyld venligst overskrift og nr.");
        let drafts = JSON.parse(localStorage.getItem('rw_drafts') || '[]');
        drafts.push(d);
        localStorage.setItem('rw_drafts', JSON.stringify(drafts));
        showModal(`<h2>GEMT</h2><button class="btn-red" onclick="closeModal()">OK</button>`);
        el('workNr').value = ''; el('headline').value = ''; el('bodyText').value = '';
    };

    window.renderDrafts = () => {
        const drafts = JSON.parse(localStorage.getItem('rw_drafts') || '[]');
        el('btnSendAll').style.display = drafts.length ? 'block' : 'none';
        el('draftList').innerHTML = drafts.map((d, i) => `
            <div class="list-item">
                <strong>${d.headline}</strong>
                <span class="info-line">${d.date} | Nr: ${d.workNr}</span>
                <span class="body-content">${d.body}</span>
            </div>
        `).join('') || "<p style='text-align:center'>Ingen kladder</p>";
    };

    el('btnSendAll').onclick = async () => {
        const drafts = JSON.parse(localStorage.getItem('rw_drafts') || '[]');
        let successCount = 0;
        
        try {
            for(let d of drafts) { 
                await addDoc(collection(db, "logs"), { 
                    date: d.date,
                    workNr: d.workNr,
                    headline: d.headline,
                    body: d.body,
                    sentAt: serverTimestamp() 
                }); 
                successCount++;
            }
            
            const mailTo = localStorage.getItem('rw_mails') || "";
            const mailBody = drafts.map(d => `NR: ${d.workNr}%0AEMNE: ${d.headline}%0A---%0A${d.body}`).join('%0A%0A');
            window.location.href = `mailto:${mailTo}?subject=Logs&body=${mailBody}`;
            
            localStorage.setItem('rw_drafts', '[]');
            renderDrafts();
            showModal(`<h2>SUCCES</h2><p>${successCount} logs arkiveret i skyen.</p><button class="btn-red" onclick="closeModal()">OK</button>`);
        } catch(e) { 
            showModal(`<h2>FEJL VED ARKIVERING</h2><p style="color:red">${e.message}</p><p>Tjek dine Firebase Rules!</p><button class="btn-red" onclick="closeModal()">LUK</button>`);
        }
    };

    window.fetchHistory = async () => {
        const date = el('historyDate').value;
        el('historyList').innerHTML = "<p style='text-align:center'>Søger i skyen...</p>";
        try {
            const q = query(collection(db, "logs"), where("date", "==", date));
            const snap = await getDocs(q);
            let h = "";
            snap.forEach(doc => {
                const data = doc.data();
                h += `
                <div class="list-item">
                    <strong>${data.headline}</strong>
                    <span class="info-line">Nr: ${data.workNr}</span>
                    <span class="body-content">${data.body}</span>
                </div>`;
            });
            el('historyList').innerHTML = h || "<p style='text-align:center'>Ingen logs fundet for denne dato.</p>";
        } catch(e) {
            el('historyList').innerHTML = `<p style="color:red">Fejl: ${e.message}</p>`;
        }
    };

    window.handleAdminOpen = () => {
        el('menuContent').style.display = 'none';
        showModal(`<h2>ADMIN</h2><input type="password" id="pw" placeholder="Kode"><button class="btn-red" onclick="checkPw()">LOG IND</button>`);
    };

    window.checkPw = () => {
        if(el('pw').value === "1234") {
            const m = localStorage.getItem('rw_mails') || '';
            showModal(`<h2>INDSTILLINGER</h2><label>Modtager-mails:</label><input id="mSet" value="${m}"><button class="btn-red" onclick="saveM()">GEM</button>`);
        } else { alert("Forkert kode"); }
    };
    window.saveM = () => { localStorage.setItem('rw_mails', el('mSet').value); closeModal(); };
</script>
</body>
</html>
