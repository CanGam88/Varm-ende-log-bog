name: Deploy Firebase Functions
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm install -g firebase-tools
      - run: cd functions && npm install
      - name: Write service account to file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
      - name: Create .env file for functions
        run: |
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" > functions/.env
          echo "GMAIL_PASS=${{ secrets.GMAIL_PASS }}" >> functions/.env
      - name: Deploy to Firebase
        run: firebase deploy --only functions --project logbog---lasse-gamborg --non-interactive
